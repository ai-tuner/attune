<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aTTune</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #000099;
            --success: #669966;
            --error: #f3f3f3;
            --bg: #ffffff;
            --text: #333;
            --note-bg: #f3f3ff;
            --highlight: #b7faf6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* --- MENU SCREEN --- */
        #menu-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }
        #menu-screen h1 {
            color: #1a237e;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0;
        }

        #topic-search {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        #topic-search:focus {
            border-color: var(--primary);
        }

        .topic-grid {
            display: grid;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .topic-card {
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .topic-card:hover {
            border-color: var(--primary);
            background: #f3f3ff;
            transform: translateY(-3px);
        }

        /* --- STUDY UI --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 15px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        .floating-icon {
            font-size: 20px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
            height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .question-section {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a237e;
            line-height: 1.3;
            background: #f3f3ff;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            padding: 15px;
            
        }

        .explanation-box {
            background: #f3f3ff;
            padding: 15px;
            border-radius: 10px;
            border-right: 5px solid var(--primary);
            margin-bottom: 24px;
            display: none;
            line-height: 1.5;
        }

        .exp-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
        }

        .options-section {
            display: grid;
            gap: 8px;
        }

        .option-btn {
            background: #fdfdfd;
            border: 1px solid #dddddd;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: 0.3s;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .option-btn.correct {
            background: #f3fff3;
            color: #333 !important;
            border: 1px solid #acacac;
        }

        .option-btn.wrong {
            background: #fdf2f2;
            color: #333333 !important;
            border: 1px solid #acacac;
            
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 25px;
            margin-bottom: 80px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        .takeaway-drawer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(calc(100% - 45px));
            width: 100%;
            max-width: 600px;
            background: var(--note-bg);
            border-radius: 16px 16px 0 0;
            border: 2px solid #ededed;
            transition: transform 0.4s;
            z-index: 100;
        }

        .takeaway-drawer.expanded {
            transform: translateX(-50%) translateY(0);
            
        }

        .drawer-handle {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .master-note-area {
            width: 90%;
            height: 200px;
            margin: 0 auto 20px;
            display: block;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f1f1f1;
            font-size: 1rem;
        }

        #notes-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 700px;
            padding: 30px;
            border-radius: 15px;
            max-height: 85vh;
            overflow-y: auto;
        }

        #full-notes-content {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.05rem;
        }
    </style>
</head>

<body>

    <div id="menu-screen">
        <a href=""></a>
        <h1 style="color: var(--primary);">Attune Concepts</h1>
        <div class="search-container">
            <input type="text" id="topic-search" placeholder="Search for a topic..." oninput="filterTopics()">
        </div>
        <div class="topic-grid" id="topic-grid"></div>
    </div>

    <div class="header">
        <div class="floating-icon" onclick="toggleNotes()">📖</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div style="font-size: 0.85rem; text-align: right;"><b id="score-display">Score: 0</b><br><span
                id="mastery-display"></span></div>
    </div>

    <div class="main-container" id="game-view">
        <div id="content-area"></div>
    </div>

    <div class="takeaway-drawer" id="drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">🔼 Keypoints</div>
        <textarea id="master-note" class="master-note-area" placeholder="Notes..."
            oninput="saveMasterNote()"></textarea>
    </div>

    <div id="notes-modal">
        <div class="modal-content"><span style="float:right; cursor:pointer; font-weight:bold;"
                onclick="toggleNotes()">✖ CLOSE</span>
            <div id="full-notes-content"></div>
        </div>
    </div>

    <script>
        let allTopics = []; // To store topics from config.json
        let topicData = { questions: [], fullNotes: "" };
        let currentIndex = 0, masteryPoints = 0, masterNoteContent = "";

        // INITIAL LOAD
        window.onload = function () {
            fetch('config.json')
                .then(res => res.json())
                .then(data => {
                    allTopics = data.topics;
                    renderTopics(allTopics);
                })
                .catch(err => {
                    document.getElementById('topic-grid').innerHTML = `<p style="color:red;">Error loading config.json. Use a local server.</p>`;
                });
        };

        function renderTopics(topics) {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.innerText = topic.title;
                card.onclick = () => loadTopic(topic.file);
                grid.appendChild(card);
            });
        }

        function filterTopics() {
            const query = document.getElementById('topic-search').value.toLowerCase();
            const filtered = allTopics.filter(t => t.title.toLowerCase().includes(query));
            renderTopics(filtered);
        }

        function loadTopic(fileName) {
            fetch(fileName)
                .then(res => res.json())
                .then(data => {
                    topicData = data;
                    topicData.questions.forEach(q => {
                        q.solved = false; q.userSelection = null;
                        q.shuffledOptions = [q.a, ...q.options].sort(() => Math.random() - 0.5);
                    });
                    currentIndex = 0; masteryPoints = 0; masterNoteContent = "";
                    document.getElementById('master-note').value = "";
                    updateScore(); highlightReference(); loadQuestion();
                    document.getElementById('menu-screen').style.display = 'none';
                });
        }

        function highlightReference() {
            let text = topicData.fullNotes;
            const terms = [...new Set(topicData.questions.map(q => q.a))];
            terms.sort((a, b) => b.length - a.length).forEach(t => {
                if (t.length > 1) {
                    const regex = new RegExp(`\\b${t}\\b`, 'gi');
                    text = text.replace(regex, `<span class="key-term">${t}</span>`);
                }
            });
            document.getElementById('full-notes-content').innerHTML = text;
        }

        function formatExplanation(text) {
            if (!text) return "";
            return text.replace(/\[img:(.*?)\]/g, '<img src="$1" class="exp-img">')
                .replace(/\[link:(.*?)\|(.*?)\]/g, '<a href="$1" target="_blank" style="color:var(--primary); font-weight:bold;">$2 ↗</a>');
        }

        function loadQuestion() {
            const cur = topicData.questions[currentIndex];
            const area = document.getElementById('content-area');
            area.innerHTML = `
            <div style="font-size: 0.8rem; color: #888; font-weight: bold; margin-bottom: 8px;">QUESTION ${currentIndex + 1} OF ${topicData.questions.length}</div>
            <div class="question-section">${cur.q}</div>
            <div class="explanation-box" id="explanation" style="display: ${cur.solved ? 'block' : 'none'}">${formatExplanation(cur.explanation)}</div>
            <div class="options-section" id="options"></div>
            <div class="nav-controls"><button class="nav-btn" onclick="prevQuestion()">◀ Back</button><button class="nav-btn" style="background:#f3fff3; color:#000000;" onclick="showExplanation()">Hint</button><button class="nav-btn" onclick="nextQuestion()">Next ▶</button></div>`;

            const optDiv = document.getElementById('options');
            cur.shuffledOptions.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn' + (cur.solved && opt === cur.a ? ' correct' : '') + (cur.solved && opt === cur.userSelection && opt !== cur.a ? ' wrong' : '');
                b.innerText = opt;
                b.onclick = () => {
                    if (cur.solved) return;
                    cur.userSelection = opt;
                    if (opt === cur.a) { b.classList.add('correct'); cur.solved = true; masteryPoints += 10; updateScore(); showExplanation(); }
                    else { b.classList.add('wrong'); masteryPoints -= 2; updateScore(); }
                };
                optDiv.appendChild(b);
            });
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / topicData.questions.length) * 100}%`;
        }

        function showExplanation() { document.getElementById('explanation').style.display = 'block'; }
        function updateScore() {
            document.getElementById('score-display').innerText = `Score: ${masteryPoints}`;
            let lvl = masteryPoints > 80 ? "Master" : (masteryPoints > 30 ? "Scholar" : "Novice");
            document.getElementById('mastery-display').innerText = `Level: ${lvl}`;
        }

        function prevQuestion() { if (currentIndex > 0) { currentIndex--; loadQuestion(); } }
        function nextQuestion() {
            if (currentIndex < topicData.questions.length - 1) { currentIndex++; loadQuestion(); }
            else { showResults(); }
        }

        function saveMasterNote() { masterNoteContent = document.getElementById('master-note').value; }

        function showResults() {
            document.getElementById('content-area').innerHTML = `
            <div style="text-align: center; padding-bottom: 100px;">
                <h2 style="color: var(--success);">Session Complete!</h2>
                <div style="text-align: left; background: var(--note-bg); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #ddd;"><p style="white-space: pre-wrap;">${masterNoteContent || "No notes written."}</p></div>
                <button onclick="startReview()" style="width: 100%; padding: 14px; background: #34495e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">🔍 Review Test</button>
                <button onclick="saveToPDF('notes')" style="width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Save Notes (PDF)</button>
                <button onclick="saveToPDF('ref')" style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Save Reference (PDF)</button>
                <button onclick="location.reload()" style="width: 100%; padding: 10px; color: #666; background: transparent; border: none; cursor: pointer;">🏠 Back to Library</button>
            </div>`;
        }

        function startReview() {
            let reviewHTML = `<h3>Review Mode</h3><button onclick="saveToPDF('review')" style="width: 100%; padding: 10px; background: var(--error); color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px;">📥 Export Review PDF</button>`;
            topicData.questions.forEach((q, i) => {
                reviewHTML += `<div class="review-item"><p><b>Q${i + 1}:</b> ${q.q}</p><div class="options-section">${q.shuffledOptions.map(opt => `<div class="option-btn ${opt === q.a ? 'correct' : (opt === q.userSelection ? 'wrong' : '')}" style="cursor:default">${opt}</div>`).join('')}</div><div class="explanation-box" style="display:block; margin-top:10px;">${formatExplanation(q.explanation)}</div></div>`;
            });
            reviewHTML += `<button onclick="showResults()" style="width:100%; margin-top:20px; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px;">Back to Results</button>`;
            document.getElementById('content-area').innerHTML = reviewHTML;
            window.scrollTo(0, 0);
        }

        async function saveToPDF(type) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 30;
            const checkOverflow = (h) => { if (y + h > 280) { doc.addPage(); y = 20; return true; } return false; };

            if (type === 'review') {
                doc.setFontSize(22); doc.text("Visual Review Report", 20, 20); y = 40;
                topicData.questions.forEach((q, i) => {
                    doc.setFont(undefined, 'bold'); doc.setFontSize(13);
                    const qL = doc.splitTextToSize(`Q${i + 1}: ${q.q}`, 170);
                    checkOverflow(qL.length * 7); doc.text(qL, 20, y); y += (qL.length * 7) + 5;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(11);
                    q.shuffledOptions.forEach(opt => {
                        let lbl = "[ ] "; if (opt === q.a) { lbl = "[CORRECT] "; doc.setTextColor(39, 174, 96); }
                        else if (opt === q.userSelection) { lbl = "[YOUR CHOICE] "; doc.setTextColor(231, 76, 60); }
                        else { doc.setTextColor(100, 100, 100); }
                        const oL = doc.splitTextToSize(lbl + opt, 160); checkOverflow(oL.length * 6);
                        doc.text(oL, 25, y); y += (oL.length * 6) + 2;
                    });
                    y += 3; doc.setTextColor(52, 152, 219); doc.setFont(undefined, 'italic');
                    const eL = doc.splitTextToSize(`Explanation: ${q.explanation || 'N/A'}`, 160);
                    checkOverflow(eL.length * 6 + 15); doc.text(eL, 25, y); y += (eL.length * 6) + 15;
                    doc.setTextColor(0, 0, 0); doc.line(20, y - 8, 190, y - 8);
                });
            } else {
                const content = type === 'notes' ? masterNoteContent : topicData.fullNotes;
                doc.setFontSize(18); doc.text(type === 'notes' ? "My Study Notes" : "Reference Material", 20, 20);
                const lines = doc.splitTextToSize(content || "N/A", 170);
                let yPos = 35;
                lines.forEach(line => { if (yPos > 280) { doc.addPage(); yPos = 20; } doc.text(line, 20, yPos); yPos += 7; });
            }
            doc.save(`${type}_report.pdf`);
        }

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('expanded'); }
        function toggleNotes() { document.getElementById('notes-modal').style.display = (document.getElementById('notes-modal').style.display === 'flex' ? 'none' : 'flex'); }
    </script>
</body>

</html>
